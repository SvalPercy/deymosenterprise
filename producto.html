<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producto</title>

<style>
body { font-family:Arial; margin:0; background:#f5f5f5; }

/* HEADER */
.header { background:#0a0a0a; color:white; padding:10px; }
.header-top { display:flex; align-items:center; gap:10px; }
.logo { color:white; text-decoration:none; font-weight:bold; }

/* CONTENIDO */
.container { max-width:900px; margin:auto; padding:10px; }

.producto {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  background:white;
  padding:15px;
  border-radius:10px;
}

/* IMÁGENES */
.img-principal {
  width:100%;
  height:300px;
  object-fit:contain;
}

.galeria {
  display:flex;
  gap:10px;
  margin-top:10px;
  flex-wrap:wrap;
}

.galeria img {
  width:60px;
  cursor:pointer;
  border:1px solid #ccc;
}

/* TEXTO */
.precio {
  color:green;
  font-size:24px;
  font-weight:bold;
}

/* BOTÓN */
.btn {
  display:block;
  background:#25D366;
  color:white;
  padding:10px;
  text-align:center;
  margin-top:10px;
  text-decoration:none;
  border-radius:5px;
}

/* ERROR */
.error {
  text-align:center;
  margin-top:50px;
  font-size:20px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .producto { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <a href="index.html" class="logo">Deymos Enterprise</a>
  </div>
</div>

<!-- CONTENIDO -->
<div class="container">
  <div id="contenido"></div>
</div>

<!-- 🔥 IMPORTANTE -->
<script src="productos.js"></script>

<script>

// Obtener ID de la URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// Buscar producto
const producto = productos.find(p => p.id == id);

// Si no existe
if (!producto) {
  document.getElementById("contenido").innerHTML = `
    <div class="error">❌ Producto no encontrado</div>
  `;
}

// Si existe
else {
  document.getElementById("contenido").innerHTML = `
    <div class="producto">

      <div>
        <img id="principal" class="img-principal" src="${producto.imagenes[0]}">

        <div class="galeria">
          ${producto.imagenes.map(img => `
            <img src="${img}" onclick="document.getElementById('principal').src='${img}'">
          `).join("")}
        </div>
      </div>

      <div>
        <h2>${producto.nombre}</h2>
        <p class="precio">S/ ${producto.precio}</p>

        <ul>
          ${producto.descripcion.map(d => `<li>${d}</li>`).join("")}
        </ul>

        <a class="btn" href="https://wa.me/51994029490">
          Comprar por WhatsApp
        </a>
      </div>

    </div>
  `;
}

</script>

</body>
</html>
