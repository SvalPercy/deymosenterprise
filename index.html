<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deymos Enterprise</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #000;
  color: white;
  text-align: center;
  padding: 15px;
}

header h1 {
  margin: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.card h3 {
  margin: 5px 0;
}

.price {
  color: green;
  font-weight: bold;
}

.btn {
  background: #25D366;
  color: white;
  padding: 8px;
  display: block;
  border-radius: 5px;
  text-decoration: none;
  margin-top: 8px;
}

.btn:hover {
  background: #1ebe5d;
}

.whatsapp-float {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #25D366;
  color: white;
  padding: 12px 15px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: bold;
}

</style>
</head>

<body>

<header>
  <h1>Deymos Enterprise</h1>
  <p>Accesorios Tecnológicos en Lima</p>
</header>

<div class="grid">

  <div class="card">
    <h3>USB 32GB Kingston</h3>
    <p class="price">S/ 25</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20USB%2032GB">Comprar</a>
  </div>

  <div class="card">
    <h3>Micro SD 64GB</h3>
    <p class="price">S/ 35</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20MicroSD%2064GB">Comprar</a>
  </div>

  <div class="card">
    <h3>Cargador Tipo C Rápido</h3>
    <p class="price">S/ 40</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20Cargador%20Tipo%20C">Comprar</a>
  </div>

  <div class="card">
    <h3>Cable USB 3.0</h3>
    <p class="price">S/ 20</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20Cable%20USB">Comprar</a>
  </div>

  <div class="card">
    <h3>Extensión Tipo C</h3>
    <p class="price">S/ 30</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20Extension%20Tipo%20C">Comprar</a>
  </div>

  <div class="card">
    <h3>Switch TP-Link 5 Puertos</h3>
    <p class="price">S/ 65</p>
    <a class="btn" href="https://wa.me/51994029490?text=Hola,%20quiero%20Switch%20TPLink">Comprar</a>
  </div>

</div>

<a class="whatsapp-float" href="https://wa.me/51994029490">
💬 WhatsApp
</a>

</body>
</html>
