<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deymos Enterprise</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
.header { background:#0a0a0a; color:white; padding:10px; }
.header-top { display:flex; align-items:center; gap:10px; }

.logo { color:white; text-decoration:none; font-weight:bold; }

/* BUSCADOR */
.search { width:50%; max-width:400px; position:relative; }
.search input { width:100%; padding:8px 30px 8px 8px; }

#clearBtn {
  position:absolute; right:10px; top:8px;
  cursor:pointer; display:none;
}

#resultados {
  position:absolute; top:35px; width:100%;
  background:white; border-radius:5px;
  box-shadow:0 5px 10px rgba(0,0,0,0.2);
  z-index:100;
}

/* LAYOUT */
.main { display:flex; }

/* SIDEBAR */
.sidebar {
  width:180px;
  background:white;
  padding:10px;
  border-right:1px solid #ddd;
}

.sidebar button {
  width:100%;
  padding:8px;
  margin-bottom:5px;
  border:none;
  background:#eee;
  cursor:pointer;
}

/* CONTENT */
.content { flex:1; padding:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  text-align:center;
  border-radius:10px;
}

.card img { width:100%; height:140px; object-fit:contain; }

.price { color:green; }

.btn {
  display:block;
  background:#25D366;
  color:white;
  padding:8px;
  margin-top:5px;
  text-decoration:none;
}

/* INFO */
.info {
  background:white;
  margin-top:20px;
  padding:15px;
  border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .main { flex-direction:column; }
  .sidebar { display:flex; overflow-x:auto; }
  .search { width:100%; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">

    <a href="index.html" class="logo">Deymos Enterprise</a>

    <div class="search">
      <input id="buscadorInput" placeholder="Buscar..." onkeyup="buscarProducto()">
      <span id="clearBtn" onclick="limpiarBusqueda()">✖</span>
      <div id="resultados"></div>
    </div>

  </div>
</div>

<div class="main">

<!-- SIDEBAR MARCAS -->
<div class="sidebar">
  <button onclick="filtrarMarca('todos')">Todas</button>
  <button onclick="filtrarMarca('UGREEN')">UGREEN</button>
  <button onclick="filtrarMarca('XIAOMI')">XIAOMI</button>
  <button onclick="filtrarMarca('REDRAGON')">REDRAGON</button>
  <button onclick="filtrarMarca('LOGITECH')">LOGITECH</button>
  <button onclick="filtrarMarca('STREAMPLIFY')">STREAMPLIFY</button>
</div>

<!-- CONTENIDO -->
<div class="content">

<div class="grid">

<div class="card" data-marca="UGREEN">
  <a href="robot-65w-negro-ugreen.html">
    <img src="cargadorugreen65wnegro.webp">
    <h4>Cargador 65W Robot UGREEN</h4>
  </a>
  <p class="price">S/ 105</p>
  <a class="btn" href="https://wa.me/51994029490">Comprar</a>
</div>

</div>

<!-- UBICACIÓN PRO -->
<div class="info">

  <h3>📍 Ubicación</h3>

  <p id="direccionTexto" style="font-weight:bold;">
    Av. Garcilaso de la Vega (ex Av. Wilson) 1251,  
    Tienda 310, Cercado de Lima – Galería Compuplaza
  </p>

  <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">

    <a href="https://maps.app.goo.gl/EpyWD9YKMdn2LJN99" target="_blank"
       style="background:#0a7; color:white; padding:8px 12px; border-radius:5px; text-decoration:none;">
      📍 Google Maps
    </a>

    <button onclick="copiarDireccion()"
      style="background:#333; color:white; padding:8px 12px; border:none; border-radius:5px; cursor:pointer;">
      📋 Copiar
    </button>

    <button onclick="enviarUbicacion()"
      style="background:#25D366; color:white; padding:8px 12px; border:none; border-radius:5px; cursor:pointer;">
      📲 WhatsApp
    </button>

  </div>

  <iframe 
    src="https://www.google.com/maps?q=Deymos%20Enterprise%20Compuplaza%20Lima&output=embed"
    width="100%" height="220"
    style="border:0; border-radius:10px;">
  </iframe>

  <h3 style="margin-top:15px;">🕒 Horario</h3>
  <p>Lunes a Sábado: 10:00 AM - 8:00 PM</p>

</div>

</div>
</div>

<script>

/* BUSCADOR */
const productos=[{
nombre:"Cargador 65W Robot UGREEN",
precio:"S/ 105",
imagen:"cargadorugreen65wnegro.webp",
link:"robot-65w-negro-ugreen.html"
}];

function buscarProducto(){
let input=buscadorInput.value.toLowerCase();
let res=resultados;
clearBtn.style.display=input?"block":"none";
res.innerHTML="";

productos.forEach(p=>{
if(p.nombre.toLowerCase().includes(input)){
res.innerHTML+=`
<div onclick="location.href='${p.link}'" style="display:flex;gap:10px;padding:8px;cursor:pointer;">
<img src="${p.imagen}" width="40">
<div>${p.nombre}<br><span style="color:green">${p.precio}</span></div>
</div>`;
}
});
}

function limpiarBusqueda(){
buscadorInput.value="";
resultados.innerHTML="";
clearBtn.style.display="none";
}

/* FILTRO MARCA */
function filtrarMarca(m){
document.querySelectorAll(".card").forEach(c=>{
c.style.display=(m==="todos"||c.dataset.marca===m)?"block":"none";
});
}

/* UBICACIÓN PRO */
function copiarDireccion(){
navigator.clipboard.writeText(document.getElementById("direccionTexto").innerText);
alert("Dirección copiada 📋");
}

function enviarUbicacion(){
let mensaje=encodeURIComponent("Ubicación Deymos Enterprise:\nhttps://maps.app.goo.gl/EpyWD9YKMdn2LJN99");
window.open("https://wa.me/51994029490?text="+mensaje);
}

</script>

</body>
</html>
