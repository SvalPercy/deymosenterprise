<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deymos Enterprise</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

/* HEADER */
.header { background:#0a0a0a; color:white; padding:10px; }
.header-top { display:flex; align-items:center; gap:10px; }

.logo { font-size:20px; font-weight:bold; text-decoration:none; color:white; }

.search { flex:1; position:relative; }
.search input { width:100%; padding:8px 30px 8px 8px; }

#clearBtn {
  position:absolute; right:10px; top:8px;
  cursor:pointer; color:#999; display:none;
}

#resultados {
  position:absolute; top:35px; left:0; width:100%;
  background:white; color:black; border-radius:5px;
  z-index:100; box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* FILTROS */
.filtros {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
  overflow-x:auto;
}

.filtros button {
  padding:8px 12px;
  border:none;
  background:#eee;
  cursor:pointer;
  border-radius:5px;
}

/* PRODUCTOS */
.container { max-width:900px; margin:auto; padding:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
}

.card {
  background:white; padding:10px; border-radius:10px; text-align:center;
}

.card img { width:100%; height:140px; object-fit:contain; }

.price { color:green; font-weight:bold; }

.btn {
  background:#25D366; color:white;
  padding:8px; display:block; margin-top:5px;
  text-decoration:none; border-radius:5px;
}

/* INFO */
.info {
  background:white;
  margin-top:20px;
  padding:15px;
  border-radius:10px;
}

/* RESPONSIVE */
@media(max-width:768px){
  .grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">

    <a href="index.html" class="logo">Deymos Enterprise</a>

    <div class="search">
      <input type="text" id="buscadorInput" placeholder="Buscar..." onkeyup="buscarProducto()">
      <span id="clearBtn" onclick="limpiarBusqueda()">✖</span>
      <div id="resultados"></div>
    </div>

  </div>
</div>

<!-- FILTROS -->
<div class="filtros">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('cargadores')">Cargadores</button>
  <button onclick="filtrar('cables')">Cables</button>
</div>

<!-- PRODUCTOS -->
<div class="container">

<div class="grid" id="productos">

<div class="card" data-cat="cargadores">
  <a href="robot-65w-negro-ugreen.html">
    <img src="cargadorugreen65wnegro.webp">
    <h4>Cargador 65W Robot UGREEN</h4>
  </a>
  <p class="price">S/ 105</p>
  <a class="btn" href="https://wa.me/51994029490">Comprar</a>
</div>

</div>

<!-- UBICACIÓN -->
<div class="info">
  <h3>📍 Ubicación</h3>
  <p>Av. Garcilaso de la Vega 1251, Tienda 310 - Compuplaza</p>

  <a href="https://maps.app.goo.gl/j6fcZnVKjdMZVDG5A" target="_blank">
    Ver en Google Maps
  </a>

  <h3>🕒 Horario</h3>
  <p>Lunes a Sábado: 10:00 AM - 8:00 PM</p>
</div>

</div>

<script>

/* BUSCADOR */
const productosData = [
  {
    nombre:"Cargador 65W Robot Negro UGREEN 15570",
    precio:"S/ 105",
    imagen:"cargadorugreen65wnegro.webp",
    link:"robot-65w-negro-ugreen.html"
  }
];

function buscarProducto(){
  let input=document.getElementById("buscadorInput").value.toLowerCase();
  let resultados=document.getElementById("resultados");
  let clearBtn=document.getElementById("clearBtn");

  resultados.innerHTML="";
  clearBtn.style.display=input?"block":"none";

  if(input==="") return;

  productosData.forEach(p=>{
    if(p.nombre.toLowerCase().includes(input)){
      resultados.innerHTML+=`
      <div onclick="window.location.href='${p.link}'"
      style="display:flex; gap:10px; padding:8px; cursor:pointer;">
        <img src="${p.imagen}" style="width:40px;">
        <div>
          <div>${p.nombre}</div>
          <div style="color:green;">${p.precio}</div>
        </div>
      </div>`;
    }
  });
}

function limpiarBusqueda(){
  document.getElementById("buscadorInput").value="";
  document.getElementById("resultados").innerHTML="";
  document.getElementById("clearBtn").style.display="none";
}

/* FILTROS */
function filtrar(cat){
  let cards=document.querySelectorAll(".card");
  cards.forEach(c=>{
    c.style.display=(cat==="todos"||c.dataset.cat===cat)?"block":"none";
  });
}

</script>

</body>
</html>
