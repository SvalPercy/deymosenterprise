<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cargador 65W Robot UGREEN</title>

<style>
body { font-family:Arial; margin:0; background:#f5f5f5; }

/* HEADER */
.header { background:#0a0a0a; color:white; padding:10px; }
.header-top { display:flex; align-items:center; gap:10px; }

.logo { font-size:20px; font-weight:bold; text-decoration:none; color:white; }

.search { flex:1; position:relative; }
.search input { width:100%; padding:8px 30px 8px 8px; }

#clearBtn {
  position:absolute; right:10px; top:8px;
  cursor:pointer; color:#999; display:none;
}

#resultados {
  position:absolute; top:35px; left:0; width:100%;
  background:white; color:black; border-radius:5px;
  z-index:100; box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* CONTENIDO */
.container { max-width:900px; margin:auto; padding:10px; }

.producto {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  background:white;
  padding:15px;
  border-radius:10px;
}

.img-principal { width:100%; height:300px; object-fit:contain; }

.galeria { display:flex; gap:10px; margin-top:10px; }
.galeria img { width:60px; cursor:pointer; }

.titulo { font-size:20px; font-weight:bold; }
.precio { font-size:24px; color:green; }

.btn {
  display:block; padding:10px; margin-top:8px;
  text-align:center; color:white; border-radius:5px;
  text-decoration:none;
}

.btn-comprar { background:#25D366; }
.btn-whatsapp { background:#0a7; }

/* RESPONSIVE */
@media(max-width:768px){
  .producto { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="header">
  <div class="header-top">

    <a href="index.html" class="logo">Deymos Enterprise</a>

    <div class="search">
      <input type="text" id="buscadorInput" placeholder="Buscar..." onkeyup="buscarProducto()">
      <span id="clearBtn" onclick="limpiarBusqueda()">✖</span>
      <div id="resultados"></div>
    </div>

  </div>
</div>

<div class="container">

<div class="producto">

<div>
  <img id="principal" src="cargadorugreen65wnegro.webp" class="img-principal">
</div>

<div>
  <div class="titulo">Cargador 65W Robot Negro UGREEN 15570</div>
  <div class="precio">S/ 105</div>

  <ul>
    <li>Carga rápida 65W</li>
    <li>2 USB-C + 1 USB-A</li>
    <li>Compatible con laptops</li>
  </ul>

  <a class="btn btn-comprar" href="https://wa.me/51994029490">Comprar</a>
  <a class="btn btn-whatsapp" href="https://wa.me/51994029490">WhatsApp</a>
</div>

</div>

</div>

<script>

const productos = [
  {
    nombre:"Cargador 65W Robot Negro UGREEN 15570",
    precio:"S/ 105",
    imagen:"cargadorugreen65wnegro.webp",
    link:"robot-65w-negro-ugreen.html"
  }
];

function buscarProducto(){
  let input=document.getElementById("buscadorInput").value.toLowerCase();
  let resultados=document.getElementById("resultados");
  let clearBtn=document.getElementById("clearBtn");

  resultados.innerHTML="";
  clearBtn.style.display=input?"block":"none";

  if(input==="") return;

  productos.forEach(p=>{
    if(p.nombre.toLowerCase().includes(input)){
      resultados.innerHTML+=`
      <div onclick="window.location.href='${p.link}'"
      style="display:flex; gap:10px; padding:8px; cursor:pointer;">
        <img src="${p.imagen}" style="width:40px;height:40px;">
        <div>
          <div>${p.nombre}</div>
          <div style="color:green;">${p.precio}</div>
        </div>
      </div>`;
    }
  });
}

function limpiarBusqueda(){
  document.getElementById("buscadorInput").value="";
  document.getElementById("resultados").innerHTML="";
  document.getElementById("clearBtn").style.display="none";
}

</script>

</body>
</html>
